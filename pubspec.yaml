name: firebaseloginsignup
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ==================== FIREBASE (Core) ====================
  firebase_core: ^3.13.0          # REQUIRED - Firebase initialization
  firebase_auth: ^5.5.2           # Login/Signup/Phone auth
  cloud_firestore: ^5.6.6         # Database - Products, Orders, etc.
  firebase_messaging: ^15.2.5     # Push notifications
  firebase_storage: ^12.4.5       # Image storage

  # ==================== AUTH ====================
  google_sign_in: ^6.3.0         # Google login

  # ==================== UI & UTILS ====================
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1              # State management
  url_launcher: ^6.3.2            # Open links
  fluttertoast: ^8.2.12            # Toast messages
  flutter_slidable: ^4.0.0         # Swipe actions (cart)
  cached_network_image: ^3.4.1     # Load images from URL
  shimmer: ^3.0.0                  # Loading skeleton effect
  intl: ^0.20.2                    # Date formatting
  badges: ^3.1.2                   # Notification badges
  carousel_slider: ^5.0.0          # Image carousel
  smooth_page_indicator: ^1.2.1   # Page dots

  # ==================== PAYMENT (REMOVED RAZORPAY) ====================
  # razorpay_flutter: ^1.4.0      # REMOVED - Causing errors

  # ==================== LOCATION ====================
  geolocator: ^13.0.4             # Get GPS location
  geocoding: ^3.0.0               # Convert GPS to address

  # ==================== SHARE ====================
  share_plus: ^11.0.0             # Share product/app

  # ==================== LOCAL NOTIFICATIONS ====================
  flutter_local_notifications: ^19.1.0

  # ==================== INTERNET CHECK ====================
  connectivity_plus: ^6.1.4        # Check WiFi/Mobile data

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/logo.png"